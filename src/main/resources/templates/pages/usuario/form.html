<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Usuário</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h1>Cadastrar Usuário</h1>

    <form th:action="@{/admin/usuario}" th:object="${usuarioDTO}" method="post">

        <div th:if="${#fields.hasErrors('*')}" class="erro-geral">
            Corrija os erros abaixo antes de continuar.
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" />
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="erro-campo"></span>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" th:field="*{password}" />
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="erro-campo"></span>
        </div>

        <div class="form-group">
            <label>Perfil</label>
            <select th:field="*{role}">
                <option th:each="r : ${T(br.com.hotel.duartepalace.model.enums.RoleUsuario).values()}"
                        th:value="${r}"
                        th:text="${r}">
                </option>
            </select>
            <span th:if="${#fields.hasErrors('role')}" th:errors="*{role}" class="erro-campo"></span>
        </div>

        <div th:if="${erroNegocio}" class="erro-geral" th:text="${erroNegocio}"></div>

        <button type="submit">Cadastrar</button>

        <div th:if="${sucesso}" class="sucesso-geral" th:text="${sucesso}"></div>
        
    </form>
</div>

</body>
</html>
